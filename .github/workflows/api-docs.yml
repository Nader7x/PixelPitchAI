name: 📚 API Documentation

on:
  push:
    branches: [main, develop]
    paths:
      - "src/**/*.cs"
      - "docs/**"
      - ".github/workflows/api-docs.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**/*.cs"
      - "docs/**"
  workflow_dispatch:
    inputs:
      deploy_to_pages:
        description: "Deploy to GitHub Pages"
        required: false
        type: boolean
        default: true

env:
  DOTNET_VERSION: "6.0.x"
  DOCS_PATH: "./docs-output"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "api-docs-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  generate-api-docs:
    name: 📖 Generate API Documentation
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔧 Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 📦 Install DocFX
        run: |
          dotnet tool install -g docfx
          docfx --version

      - name: 📦 Restore Dependencies
        run: dotnet restore

      - name: 🏗️ Build Project
        run: |
          dotnet build --configuration Release --no-restore

      - name: 📋 Generate XML Documentation
        run: |
          dotnet build src/Footex.API/Footex.API.csproj \
            --configuration Release \
            --no-restore \
            -p:GenerateDocumentationFile=true \
            -p:DocumentationFile=bin/Release/net6.0/Footex.API.xml

      - name: 📚 Setup DocFX Configuration
        run: |
          mkdir -p ${{ env.DOCS_PATH }}
          cat > docfx.json << 'EOF'
          {
            "metadata": [
              {
                "src": [
                  {
                    "files": ["src/**/*.csproj"],
                    "exclude": ["**/bin/**", "**/obj/**"]
                  }
                ],
                "dest": "api",
                "disableGitFeatures": false,
                "disableDefaultFilter": false,
                "includePrivateMembers": false,
                "properties": {
                  "TargetFramework": "net6.0"
                }
              }
            ],
            "build": {
              "content": [
                {
                  "files": ["api/**.yml", "api/index.md"]
                },
                {
                  "files": ["docs/**.md", "*.md"],
                  "exclude": ["obj/**", "_site/**"]
                }
              ],
              "resource": [
                {
                  "files": ["images/**", "docs/images/**"]
                }
              ],
              "output": "${{ env.DOCS_PATH }}",
              "globalMetadataFiles": [],
              "fileMetadataFiles": [],
              "template": ["default"],
              "postProcessors": [],
              "markdownEngineName": "markdig",
              "noLangKeyword": false,
              "keepFileLink": false,
              "cleanupCacheHistory": false,
              "disableGitFeatures": false,
              "globalMetadata": {
                "_appTitle": "Footex API Documentation",
                "_appName": "Footex",
                "_appFooter": "Footex Football Management System",
                "_enableSearch": true,
                "_gitContribute": {
                  "repo": "https://github.com/${{ github.repository }}",
                  "branch": "main"
                }
              }
            }
          }
          EOF

      - name: 📚 Create Documentation Index
        run: |
          mkdir -p docs
          cat > docs/index.md << 'EOF'
          # Footex API Documentation

          Welcome to the Footex Football Management System API documentation.

          ## Overview

          Footex is a comprehensive football management system built with .NET Core, providing:

          - **Player Management**: Complete player profiles, statistics, and career tracking
          - **Team Management**: Team composition, formation, and strategy management  
          - **Match Management**: Live match tracking, statistics, and results
          - **League Management**: Tournament organization and standings
          - **Analytics**: Advanced statistics and performance metrics

          ## API Reference

          The API follows RESTful principles and provides endpoints for all major functionality.

          ### Authentication

          The API uses JWT Bearer token authentication. Include the token in the Authorization header:

          ```
          Authorization: Bearer <your-jwt-token>
          ```

          ### Base URL

          ```
          Production: https://api.footex.com/api/v1
          Staging: https://staging-api.footex.com/api/v1  
          Development: https://localhost:5001/api/v1
          ```

          ### Response Format

          All API responses follow a consistent format:

          ```json
          {
            "success": true,
            "data": {},
            "message": "Operation completed successfully",
            "timestamp": "2023-12-01T10:30:00Z"
          }
          ```

          ### Error Handling

          Error responses include detailed information:

          ```json
          {
            "success": false,
            "error": {
              "code": "VALIDATION_ERROR",
              "message": "Invalid input data",
              "details": ["Name is required", "Age must be positive"]
            },
            "timestamp": "2023-12-01T10:30:00Z"
          }
          ```

          ## Quick Start

          1. **Authentication**: Obtain a JWT token via `/auth/login`
          2. **Explore**: Browse the API reference for available endpoints
          3. **Test**: Use the interactive documentation to try API calls
          4. **Integrate**: Use the provided code examples in your application

          ## SDK and Libraries

          - **.NET Client**: Available via NuGet package `Footex.Client`
          - **JavaScript Client**: Available via npm package `@footex/api-client`
          - **OpenAPI Specification**: Download from `/swagger/v1/swagger.json`

          ## Support

          - **Documentation Issues**: [Report here](https://github.com/${{ github.repository }}/issues/new?template=documentation.md)
          - **API Bugs**: [Report here](https://github.com/${{ github.repository }}/issues/new?template=bug_report.md)
          - **Feature Requests**: [Request here](https://github.com/${{ github.repository }}/issues/new?template=feature_request.md)

          EOF

      - name: 📖 Generate Documentation
        run: |
          # Generate API metadata
          docfx metadata docfx.json

          # Build the documentation site
          docfx build docfx.json

          echo "📊 Documentation generated successfully!"
          ls -la ${{ env.DOCS_PATH }}

      - name: 🔍 Generate OpenAPI Specification
        run: |
          # Install Swashbuckle CLI
          dotnet tool install -g Swashbuckle.AspNetCore.Cli

          # Generate OpenAPI spec
          mkdir -p ${{ env.DOCS_PATH }}/swagger
          dotnet swagger tofile --output ${{ env.DOCS_PATH }}/swagger/openapi.json \
            src/Footex.API/bin/Release/net6.0/Footex.API.dll v1
            
          # Generate Swagger UI
          cat > ${{ env.DOCS_PATH }}/swagger/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <title>Footex API - Swagger UI</title>
            <link rel="stylesheet" type="text/css" href="https://unpkg.com/swagger-ui-dist@4.15.5/swagger-ui.css" />
          </head>
          <body>
            <div id="swagger-ui"></div>
            <script src="https://unpkg.com/swagger-ui-dist@4.15.5/swagger-ui-bundle.js"></script>
            <script>
              SwaggerUIBundle({
                url: './openapi.json',
                dom_id: '#swagger-ui',
                presets: [
                  SwaggerUIBundle.presets.apis,
                  SwaggerUIBundle.presets.standalone
                ],
                layout: "StandaloneLayout"
              });
            </script>
          </body>
          </html>
          EOF

      - name: 📊 Generate API Statistics
        run: |
          echo "📊 Generating API documentation statistics..."

          # Count endpoints
          ENDPOINTS=$(grep -r "app\.Map\|Controller\|Route\|HttpGet\|HttpPost\|HttpPut\|HttpDelete" src/ --include="*.cs" | wc -l)

          # Count models
          MODELS=$(find src/ -name "*.cs" -exec grep -l "public class.*Model\|public record\|public enum" {} \; | wc -l)

          # Generate statistics file
          cat > ${{ env.DOCS_PATH }}/statistics.md << EOF
          # API Documentation Statistics

          Generated on: $(date -u +"%Y-%m-%d %H:%M:%S UTC")

          ## Metrics

          - **Estimated Endpoints**: $ENDPOINTS
          - **Model Classes**: $MODELS
          - **Documentation Files**: $(find ${{ env.DOCS_PATH }} -name "*.html" -o -name "*.md" | wc -l)
          - **API Version**: v1.0

          ## Coverage

          - **XML Documentation**: ✅ Generated
          - **OpenAPI Specification**: ✅ Generated  
          - **Interactive Documentation**: ✅ Available
          - **Code Examples**: ✅ Included

          EOF

      - name: 📤 Upload Documentation Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: api-documentation
          path: ${{ env.DOCS_PATH }}
          retention-days: 30

      - name: 🔍 Validate Documentation
        run: |
          echo "🔍 Validating generated documentation..."

          # Check if main files exist
          if [ ! -f "${{ env.DOCS_PATH }}/index.html" ]; then
            echo "❌ Main documentation index not found"
            exit 1
          fi

          if [ ! -f "${{ env.DOCS_PATH }}/swagger/openapi.json" ]; then
            echo "❌ OpenAPI specification not found"
            exit 1
          fi

          # Check if OpenAPI spec is valid JSON
          if ! cat "${{ env.DOCS_PATH }}/swagger/openapi.json" | jq empty; then
            echo "❌ OpenAPI specification is not valid JSON"
            exit 1
          fi

          echo "✅ Documentation validation passed!"
          echo "📊 Generated files:"
          find ${{ env.DOCS_PATH }} -type f | head -20

  deploy-to-pages:
    name: 🚀 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: generate-api-docs
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event.inputs.deploy_to_pages == 'true')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 📥 Download Documentation
        uses: actions/download-artifact@v4
        with:
          name: api-documentation
          path: ./docs-site

      - name: 🔧 Setup Pages
        uses: actions/configure-pages@v4

      - name: 📤 Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs-site

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: 📊 Deployment Summary
        run: |
          echo "🎉 API documentation deployed successfully!"
          echo "🔗 Documentation URL: ${{ steps.deployment.outputs.page_url }}"
          echo "📚 Swagger UI: ${{ steps.deployment.outputs.page_url }}swagger/"
          echo "📋 OpenAPI Spec: ${{ steps.deployment.outputs.page_url }}swagger/openapi.json"

  notify-docs-update:
    name: 📢 Notify Documentation Update
    runs-on: ubuntu-latest
    needs: [generate-api-docs, deploy-to-pages]
    if: always() && needs.generate-api-docs.result == 'success'

    steps:
      - name: 📧 Documentation Update Notification
        run: |
          echo "📚 API documentation has been updated!"
          echo "🔗 View documentation: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          echo "📋 Commit: ${{ github.sha }}"
          echo "👤 Updated by: ${{ github.actor }}"

          # Add your notification logic here:
          # - Slack webhook for dev team
          # - Update status page
          # - Notify API consumers
          # - Update documentation changelog
