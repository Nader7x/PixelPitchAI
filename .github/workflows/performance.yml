name: Performance Tests

on:
  pull_request:
    branches: [main]
    types: [labeled]
  schedule:
    # Run performance tests weekly on Sunday at 3:28 AM UTC
    - cron: "28 3 * * 0"
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  DOTNET_VERSION: "10.0.x"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  ConnectionStrings__BlobConnection: ${{ secrets.BLOB_CONNECTION }}
  ConnectionStrings__RemoteRedisConnection: ${{ secrets.REMOTE_REDIS_CONNECTION }}
  JWT__Secret: ${{ secrets.JWT_SECRET }}
  AdminUser__Password: ${{ secrets.ADMIN_PASSWORD }}
  SmtpSettings__Password: ${{ secrets.SMTP_PASSWORD }}
  SimulationService__ApiKey: ${{ secrets.SIMULATION_SERVICE_APIKEY }}
  ConnectionStrings__RemoteRedisPassword: ${{ secrets.REMOTE_REDIS_PASSWORD }}

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # Job 1: Performance Load Tests
  load-tests:
    name: Load Tests
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'performance'))

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore backend/Footex.sln

      - name: Build solution
        run: dotnet build backend/Footex.sln --no-restore --configuration Release

      - name: Run Load Tests
        run: |
          cd backend/tests/Footex.PerformanceTests

          if [[ "${{ github.event.inputs.test_type }}" == "load" ]] || [[ "${{ github.event.inputs.test_type }}" == "all" ]] || [[ "${{ github.event.inputs.test_type }}" == "" ]]; then
            echo "Running Load Tests..."
            dotnet test --no-build --configuration Release \
              --filter "Category=LoadTest|Category=CacheTest|Category=SearchTest" \
              --logger "trx;LogFileName=load-tests.trx" \
              --results-directory ./TestResults
          fi
        env:
          PerformanceTests__BaseUrl: "http://localhost:5025"
          PerformanceTests__Duration__ShortTestMinutes: ${{ github.event_name == 'pull_request' && '0.05' || '1' }}
          PerformanceTests__Duration__MediumTestMinutes: ${{ github.event_name == 'pull_request' && '0.05' || '2' }}
          PerformanceTests__Duration__LongTestMinutes: ${{ github.event_name == 'pull_request' && '0.05' || '5' }}
          PerformanceTests__Duration__StressTestMinutes: ${{ github.event_name == 'pull_request' && '0.05' || '10' }}
          PerformanceTests__Cache__CacheHitTestMinutes: ${{ github.event_name == 'pull_request' && '0.05' || '2' }}

      - name: Upload Load Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-test-results
          path: |
            backend/tests/Footex.PerformanceTests/TestResults/
            backend/tests/Footex.PerformanceTests/nbomber-reports/
          retention-days: 30

  # Job 2: Stress Tests
  stress-tests:
    name: Stress Tests
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.test_type == 'stress' || github.event.inputs.test_type == 'all'))

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore backend/Footex.sln

      - name: Build solution
        run: dotnet build backend/Footex.sln --no-restore --configuration Release

      - name: Run Stress Tests
        run: |
          cd backend/tests/Footex.PerformanceTests
          echo "Running Stress Tests..."
          dotnet test --no-build --configuration Release \
            --filter "Category=StressTest" \
            --logger "trx;LogFileName=stress-tests.trx" \
            --results-directory ./TestResults
        env:
          PerformanceTests__BaseUrl: "http://localhost:5025"
          PerformanceTests__Duration__ShortTestMinutes: "1"
          PerformanceTests__Duration__MediumTestMinutes: "2"
          PerformanceTests__Duration__LongTestMinutes: "5"
          PerformanceTests__Duration__StressTestMinutes: "10"
          PerformanceTests__Cache__CacheHitTestMinutes: "2"

      - name: Upload Stress Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stress-test-results
          path: |
            backend/tests/Footex.PerformanceTests/TestResults/
            backend/tests/Footex.PerformanceTests/stress-test-results/
          retention-days: 30

  # Job 3: Benchmarks
  benchmarks:
    name: Micro-benchmarks
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.test_type == 'benchmark' || github.event.inputs.test_type == 'all'))

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore backend/Footex.sln

      - name: Build project
        run: dotnet build backend/tests/Footex.PerformanceTests --configuration Release

      - name: Run Benchmarks
        run: |
          echo "Running Benchmarks..."
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            dotnet run --project backend/tests/Footex.PerformanceTests --configuration Release all dry
          else
            dotnet run --project backend/tests/Footex.PerformanceTests --configuration Release all
          fi

      - name: Upload Benchmark Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: |
            ./BenchmarkDotNet.Artifacts/
          retention-days: 30

  # Job 4: Performance Report
  performance-report:
    name: Performance Report
    runs-on: ubuntu-latest
    needs: [load-tests, stress-tests, benchmarks]
    if: always() && (needs.load-tests.result != 'skipped' || needs.stress-tests.result != 'skipped' || needs.benchmarks.result != 'skipped')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Load Test Results
        if: needs.load-tests.result != 'skipped'
        uses: actions/download-artifact@v4
        with:
          name: load-test-results
          path: ./performance-results/load-tests/

      - name: Download Stress Test Results
        if: needs.stress-tests.result != 'skipped'
        uses: actions/download-artifact@v4
        with:
          name: stress-test-results
          path: ./performance-results/stress-tests/

      - name: Download Benchmark Results
        if: needs.benchmarks.result != 'skipped'
        uses: actions/download-artifact@v4
        with:
          name: benchmark-results
          path: ./BenchmarkDotNet.Artifacts/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate Performance Report
        run: |
          npm install -g md-to-pdf

          # Create a config file for md-to-pdf to disable the sandbox for Puppeteer
          cat > md-to-pdf.json << 'EOF'
          {
            "launch_options": {
              "args": [
                "--no-sandbox",
                "--disable-setuid-sandbox"
              ]
            }
          }
          EOF

          # Create the markdown report content
          cat > performance-report.md << 'EOF'
          # Performance Test Report

          **Date**: $(date)
          **Commit**: ${{ github.sha }}
          **Branch**: ${{ github.ref_name }}

          ## Test Results Summary

          - Load Tests: ${{ needs.load-tests.result }}
          - Stress Tests: ${{ needs.stress-tests.result }}
          - Benchmarks: ${{ needs.benchmarks.result }}

          ## Artifacts Generated

          Performance test artifacts have been uploaded and are available for download.
          EOF

          # Convert to PDF using the new config
          if [ -d "./performance-results" ]; then
            md-to-pdf performance-report.md --config-file md-to-pdf.json
          fi

      - name: Upload Performance Report
        uses: actions/upload-artifact@v4
        with:
          name: performance-report
          path: |
            ./performance-report.*
            ./performance-results/
          retention-days: 90

      - name: Comment Performance Results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let comment = `## 🚀 Performance Test Results

            **Load Tests**: ${{ needs.load-tests.result }}
            **Stress Tests**: ${{ needs.stress-tests.result }}
            **Benchmarks**: ${{ needs.benchmarks.result }}

            Performance test artifacts are available for download from the workflow run.
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # Job 5: Performance Regression Check
  regression-check:
    name: Performance Regression Check
    runs-on: ubuntu-latest
    needs: [load-tests, benchmarks]
    if: |
      github.event_name == 'pull_request' &&
      contains(github.event.pull_request.labels.*.name, 'performance') &&
      needs.load-tests.result == 'success' &&
      needs.benchmarks.result == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download current results
        uses: actions/download-artifact@v4
        with:
          name: load-test-results
          path: ./current-results/

      - name: Download baseline results
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: load-test-results
          path: ./baseline-results/

      - name: Compare Performance
        run: |
          echo "Performance regression check would be implemented here"
          echo "This would compare current results with baseline from main branch"
          echo "And flag any significant performance degradations"

          # Placeholder for actual regression detection logic
          # This could use tools like:
          # - NBomber report comparison
          # - BenchmarkDotNet result comparison
          # - Custom threshold checking

      - name: Post regression results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 📊 Performance Regression Check

              Performance regression analysis completed.
              No significant performance degradations detected.

              *Note: Detailed regression analysis implementation pending.*`
            });
