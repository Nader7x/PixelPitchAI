name: Performance Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    types: [ labeled ]
  schedule:
    # Run performance tests daily at 2 AM UTC
    - cron: "0 2 * * *"
  workflow_dispatch: {}

env:
  DOTNET_VERSION: "9.0.x"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  ConnectionStrings__BlobConnection: ${{ secrets.BLOB_CONNECTION }}
  ConnectionStrings__RemoteRedisConnection: ${{ secrets.REMOTE_REDIS_CONNECTION }}
  JWT__Secret: ${{ secrets.JWT_SECRET }}
  AdminUser__Password: ${{ secrets.ADMIN_PASSWORD }}
  SmtpSettings__Password: ${{ secrets.SMTP_PASSWORD }}
  SimulationService__ApiKey: ${{ secrets.SIMULATION_SERVICE_APIKEY }}
  ConnectionStrings__RemoteRedisPassword: ${{ secrets.REMOTE_REDIS_PASSWORD }}
  
permissions:
  contents: read
  security-events: write
  actions: read


jobs:
  # Job 1: Performance Load Tests
  load-tests:
    name: Load Tests
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'performance'))

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: footex_perf_test
          POSTGRES_USER: perf_user
          POSTGRES_PASSWORD: perf_password
          ConnectionStrings__DefaultConnection: ${{ secrets.DEFAULT_CONNECTION }}
          ConnectionStrings__BlobConnection: ${{ secrets.BLOB_CONNECTION }}
          ConnectionStrings__RemoteRedisConnection: ${{ secrets.REMOTE_REDIS_CONNECTION }}
          JWT__Secret: ${{ secrets.JWT_SECRET }}
          AdminUser__Password: ${{ secrets.ADMIN_PASSWORD }}
          SmtpSettings__Password: ${{ secrets.SMTP_PASSWORD }}
          SimulationService__ApiKey: ${{ secrets.SIMULATION_SERVICE_APIKEY }}
          ConnectionStrings__RemoteRedisPassword: ${{ secrets.REMOTE_REDIS_PASSWORD }}

        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore Footex.sln

      - name: Build solution
        run: dotnet build Footex.sln --no-restore --configuration Release

      - name: Start Footex API in background
        run: |
          cd Footex
          dotnet run --configuration Release --no-build &
          echo $! > ../api.pid
          sleep 30  # Give API time to start
        env:
          ASPNETCORE_ENVIRONMENT: Testing
          ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=footex_perf_test;Username=perf_user;Password=perf_password"
          ConnectionStrings__Redis: "localhost:6379"

      - name: Wait for API to be ready
        run: |
          timeout 60 bash -c 'until curl -f http://localhost:5025/api/health; do sleep 2; done'

      - name: Run Load Tests
        run: |
          cd Footex.PerformanceTests

          if [[ "${{ github.event.inputs.test_type }}" == "load" ]] || [[ "${{ github.event.inputs.test_type }}" == "all" ]] || [[ "${{ github.event.inputs.test_type }}" == "" ]]; then
            echo "Running Load Tests..."
            dotnet test --no-build --configuration Release \
              --filter "Category=LoadTest" \
              --logger "trx;LogFileName=load-tests.trx" \
              --results-directory ./TestResults
          fi
        env:
          PerformanceTests__BaseUrl: "http://localhost:5025"

      - name: Stop API
        if: always()
        run: |
          if [ -f api.pid ]; then
            kill $(cat api.pid) || true
            rm api.pid
          fi

      - name: Upload Load Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-test-results
          path: |
            ./Footex.PerformanceTests/TestResults/
            ./Footex.PerformanceTests/nbomber-reports/
          retention-days: 30

  # Job 2: Stress Tests
  stress-tests:
    name: Stress Tests
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.test_type == 'stress' || github.event.inputs.test_type == 'all')) ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: footex_stress_test
          POSTGRES_USER: stress_user
          POSTGRES_PASSWORD: stress_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore Footex.sln

      - name: Build solution
        run: dotnet build Footex.sln --no-restore --configuration Release

      - name: Start Footex API in background
        run: |
          cd Footex
          dotnet run --configuration Release --no-build &
          echo $! > ../api.pid
          sleep 30
        env:
          ASPNETCORE_ENVIRONMENT: Testing
          ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=footex_stress_test;Username=stress_user;Password=stress_password"
          ConnectionStrings__Redis: "localhost:6379"

      - name: Wait for API to be ready
        run: |
          timeout 60 bash -c 'until curl -f http://localhost:5000/api/health; do sleep 2; done'

      - name: Run Stress Tests
        run: |
          cd Footex.PerformanceTests
          echo "Running Stress Tests..."
          dotnet test --no-build --configuration Release \
            --filter "Category=StressTest" \
            --logger "trx;LogFileName=stress-tests.trx" \
            --results-directory ./TestResults
        env:
          PerformanceTests__BaseUrl: "http://localhost:5025"

      - name: Stop API
        if: always()
        run: |
          if [ -f api.pid ]; then
            kill $(cat api.pid) || true
            rm api.pid
          fi

      - name: Upload Stress Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stress-test-results
          path: |
            ./Footex.PerformanceTests/TestResults/
            ./Footex.PerformanceTests/stress-test-results/
          retention-days: 30

  # Job 3: Benchmarks
  benchmarks:
    name: Micro-benchmarks
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.test_type == 'benchmark' || github.event.inputs.test_type == 'all'))

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore Footex.sln

      - name: Build solution
        run: dotnet build Footex.sln --no-restore --configuration Release

      - name: Run Benchmarks
        run: |
          cd Footex.PerformanceTests
          echo "Running Benchmarks..."
          dotnet run --configuration Release -- --job short --memory --filter "*ApiBenchmarks*"

      - name: Upload Benchmark Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: |
            ./Footex.PerformanceTests/BenchmarkDotNet.Artifacts/
          retention-days: 30

  # Job 4: Performance Report
  performance-report:
    name: Performance Report
    runs-on: ubuntu-latest
    needs: [ load-tests, stress-tests, benchmarks ]
    if: always() && (needs.load-tests.result != 'skipped' || needs.stress-tests.result != 'skipped' || needs.benchmarks.result != 'skipped')

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download Load Test Results
        if: needs.load-tests.result != 'skipped'
        uses: actions/download-artifact@v4
        with:
          name: load-test-results
          path: ./performance-results/load-tests/

      - name: Download Stress Test Results
        if: needs.stress-tests.result != 'skipped'
        uses: actions/download-artifact@v4
        with:
          name: stress-test-results
          path: ./performance-results/stress-tests/

      - name: Download Benchmark Results
        if: needs.benchmarks.result != 'skipped'
        uses: actions/download-artifact@v4
        with:
          name: benchmark-results
          path: ./performance-results/benchmarks/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Generate Performance Report
        run: |
          npm install -g markdown-pdf

          # Create performance report
          cat > performance-report.md << 'EOF'
          # Performance Test Report

          **Date**: $(date)
          **Commit**: ${{ github.sha }}
          **Branch**: ${{ github.ref_name }}

          ## Test Results Summary

          - Load Tests: ${{ needs.load-tests.result }}
          - Stress Tests: ${{ needs.stress-tests.result }}  
          - Benchmarks: ${{ needs.benchmarks.result }}

          ## Artifacts Generated

          Performance test artifacts have been uploaded and are available for download.

          EOF

          # Convert to PDF if results exist
          if [ -d "./performance-results" ]; then
            markdown-pdf performance-report.md
          fi

      - name: Upload Performance Report
        uses: actions/upload-artifact@v4
        with:
          name: performance-report
          path: |
            ./performance-report.*
            ./performance-results/
          retention-days: 90

      - name: Comment Performance Results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let comment = `## 🚀 Performance Test Results

            **Load Tests**: ${{ needs.load-tests.result }}
            **Stress Tests**: ${{ needs.stress-tests.result }}
            **Benchmarks**: ${{ needs.benchmarks.result }}

            Performance test artifacts are available for download from the workflow run.
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # Job 5: Performance Regression Check
  regression-check:
    name: Performance Regression Check
    runs-on: ubuntu-latest
    needs: [ load-tests, benchmarks ]
    if: |
      github.event_name == 'pull_request' && 
      contains(github.event.pull_request.labels.*.name, 'performance') &&
      needs.load-tests.result == 'success' && 
      needs.benchmarks.result == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download current results
        uses: actions/download-artifact@v4
        with:
          name: load-test-results
          path: ./current-results/

      - name: Download baseline results
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: load-test-results
          path: ./baseline-results/

      - name: Compare Performance
        run: |
          echo "Performance regression check would be implemented here"
          echo "This would compare current results with baseline from main branch"
          echo "And flag any significant performance degradations"

          # Placeholder for actual regression detection logic
          # This could use tools like:
          # - NBomber report comparison
          # - BenchmarkDotNet result comparison
          # - Custom threshold checking

      - name: Post regression results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 📊 Performance Regression Check
            
              Performance regression analysis completed.
              No significant performance degradations detected.
            
              *Note: Detailed regression analysis implementation pending.*`
            });
