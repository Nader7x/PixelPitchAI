name: Deploy to Production

on:
  workflow_run:
    workflows: ["Docker Images"]
    types:
      - completed
    branches: [main]
  push:
    branches: [main]
    paths:
      - "docker-compose.yml"
      - "docker-compose.dev.yml"
      - "Caddyfile*"
      - ".env.example"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to GCP VM
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Compute short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_SHA: ${{ github.event.workflow_run.head_sha }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: EVENT_NAME,WORKFLOW_SHA
          script: |
            cd ~/Footex || (git clone https://github.com/Nader7x/PixelPitchAI.git ~/Footex && cd ~/Footex)
            git pull origin main

            if [ "$EVENT_NAME" = "workflow_run" ]; then
              export IMAGE_TAG="sha-${WORKFLOW_SHA:0:7}"
            else
              export IMAGE_TAG="main"
            fi
            
            echo "🚀 Event: $EVENT_NAME. Deploying with IMAGE_TAG=${IMAGE_TAG}"

            docker compose pull footex-api
            docker compose up -d footex-api caddy
            docker compose ps

      - name: Health check
        run: |
          sleep 15
          for i in $(seq 1 5); do
            if curl -sf https://pixelpitchai.duckdns.org/api/health; then
              echo "✅ Health check passed (through HTTPS Caddy)"
              exit 0
            fi
            echo "⏳ Attempt $i/5 failed, waiting..."
            sleep 10
          done
          echo "❌ Health check failed"
          exit 1
