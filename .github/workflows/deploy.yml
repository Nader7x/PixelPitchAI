name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to GCP VM
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 20m
          script: |
            cd ~/Footex || (git clone https://github.com/Nader7x/Footex.git ~/Footex && cd ~/Footex)
            git pull origin main
            sudo docker compose up -d --build footex-api
            sudo docker compose ps

      - name: Health check
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
        run: |
          sleep 30
          for i in $(seq 1 5); do
            if curl -sf http://"$VM_HOST":8080/api/health; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i/5 failed, waiting..."
            sleep 15
          done
          echo "Health check failed"
          exit 1
