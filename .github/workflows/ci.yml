name: CI Pipeline

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "README.md"
      - "caddy/**"
      - "scripts/**"
      - "docker-compose.yml"
      - "docker-compose.dev.yml"
      - ".github/workflows/deploy.yml"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "README.md"
      - "caddy/**"
      - "scripts/**"
      - "docker-compose.yml"
      - "docker-compose.dev.yml"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  DOTNET_VERSION: "10.0.x"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  ConnectionStrings__BlobConnection: ${{ secrets.BLOB_CONNECTION }}
  ConnectionStrings__RemoteRedisConnection: ${{ secrets.REMOTE_REDIS_CONNECTION }}
  JWT__Secret: ${{ secrets.JWT_SECRET }}
  AdminUser__Password: ${{ secrets.ADMIN_PASSWORD }}
  SmtpSettings__Password: ${{ secrets.SMTP_PASSWORD }}
  SimulationService__ApiKey: ${{ secrets.SIMULATION_SERVICE_APIKEY }}
  ConnectionStrings__RemoteRedisPassword: ${{ secrets.REMOTE_REDIS_PASSWORD }}

permissions:
  contents: read
  pull-requests: write

jobs:
  # Job 1: Build and Unit Tests
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: 'backend/**/*.csproj'

      - name: Restore dependencies
        run: dotnet restore backend/Footex.sln

      - name: Build solution
        run: dotnet build backend/Footex.sln --no-restore --configuration Release

      - name: Run Unit Tests
        run: |
          dotnet test backend/tests/Footex.UnitTests/Footex.UnitTests.csproj \
            --no-build \
            --configuration Release \
            --verbosity normal \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            --logger "trx;LogFileName=unit-tests.trx"

      - name: Upload Unit Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: |
            ./TestResults/unit-tests.trx
            ./TestResults/**/coverage.cobertura.xml
          retention-days: 7

  # Job 2: Integration Tests
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
      rabbitmq:
        image: rabbitmq:3-management
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5672:5672
          - 15672:15672
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: 'backend/**/*.csproj'

      - name: Restore dependencies
        run: dotnet restore backend/Footex.sln

      - name: Build solution
        run: dotnet build backend/Footex.sln --no-restore --configuration Release

      - name: Run Integration Tests
        run: |
          dotnet test backend/tests/Footex.IntegrationTests/Footex.IntegrationTests.csproj \
            --no-build \
            --configuration Release \
            --verbosity normal \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            --logger "trx;LogFileName=integration-tests.trx"

      - name: Upload Integration Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: |
            ./TestResults/integration-tests.trx
            ./TestResults/**/coverage.cobertura.xml
          retention-days: 7

  # Job 3: Code Coverage Report
  code-coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: 'backend/**/*.csproj'

      - name: Download Unit Test Results
        uses: actions/download-artifact@v4
        with:
          name: unit-test-results
          path: ./TestResults/Unit

      - name: Download Integration Test Results
        uses: actions/download-artifact@v4
        with:
          name: integration-test-results
          path: ./TestResults/Integration

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate Coverage Report
        run: |
          reportgenerator \
            -reports:"./TestResults/**/coverage.cobertura.xml" \
            -targetdir:"./CoverageReport" \
            -reporttypes:"Html;Cobertura;JsonSummary" \
            -verbosity:Info

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./CoverageReport
          retention-days: 30

      - name: Comment Coverage on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          recreate: true
          path: ./CoverageReport/Summary.json
  # Job 4: Quality Gate
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, code-coverage]
    if: always()

    steps:
      - name: Check test results
        run: |
          if [[ "${{ needs.unit-tests.result }}" != "success" ]]; then
            echo "❌ Unit tests failed"
            exit 1
          fi

          if [[ "${{ needs.integration-tests.result }}" != "success" ]]; then
            echo "❌ Integration tests failed"
            exit 1
          fi

          echo "✅ All quality gates passed!"
