name: 🔒 Security Monitoring

on:
  schedule:
    # Run daily security scans
    - cron: "37 4 * * *"
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - "backend/**/*.csproj"
      - "frontend/package.json"
      - "frontend/pnpm-lock.yaml"
      - "simulation-engine/pyproject.toml"
      - "simulation-engine/uv.lock"
      - "**/Dockerfile*"
      - "docker-compose*.yml"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - "backend/**/*.csproj"
      - "frontend/package.json"
      - "frontend/pnpm-lock.yaml"
      - "simulation-engine/pyproject.toml"
      - "simulation-engine/uv.lock"
      - "**/Dockerfile*"
      - "docker-compose*.yml"
  # checkov:skip=CKV_GHA_7: Intentionally allowing workflow_dispatch inputs for scan selection
  workflow_dispatch:
    inputs:
      scan_type:
        description: "Which scans to run"
        type: choice
        default: "full"
        options:
          - full
          - dependencies
          - code
          - containers

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  DOTNET_VERSION: "10.0.x"

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  dependency-scan:
    name: 🔍 Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    if: github.event.inputs.scan_type == 'full' || github.event.inputs.scan_type == 'dependencies' || github.event.inputs.scan_type == ''

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔧 Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 📦 Restore Dependencies
        run: dotnet restore backend/Footex.sln

      - name: 🔍 Run .NET Security Audit
        run: |
          echo "🔍 Running .NET security audit..."
          dotnet list backend/Footex.sln package --vulnerable --include-transitive > vulnerability-report.txt 2>&1 || true

          if grep -q "no vulnerable packages" vulnerability-report.txt; then
            echo "✅ No vulnerable packages found"
          else
            echo "⚠️ Vulnerable packages detected:"
            cat vulnerability-report.txt
          fi



  code-analysis:
    name: 🔍 Static Code Analysis
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.scan_type == 'full' || github.event.inputs.scan_type == 'code'))

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔧 Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 🔍 Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp
          queries: security-and-quality

      - name: 🏗️ Build for Analysis
        run: |
          dotnet restore backend/Footex.sln
          dotnet build backend/Footex.sln --configuration Release --no-restore

      - name: 🔍 Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:csharp"



  secrets-scan:
    name: 🔐 Secrets Detection
    runs-on: ubuntu-latest
    if: github.event.inputs.scan_type == 'full' || github.event.inputs.scan_type == 'code' || github.event.inputs.scan_type == ''

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 Run GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  container-scan:
    name: 🐳 Container Security Scan
    runs-on: ubuntu-latest
    if: github.event.inputs.scan_type == 'full' || github.event.inputs.scan_type == 'containers' || github.event.inputs.scan_type == ''

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🏗️ Build Docker Image
        run: |
          docker build -t footex-security-scan:latest -f backend/src/Footex/Dockerfile ./backend

      - name: 🔍 Run Trivy Container Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "footex-security-scan:latest"
          format: "sarif"
          output: "trivy-results.sarif"

      - name: 📤 Upload Trivy Results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

      - name: 🔍 Run Hadolint Dockerfile Linting
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: backend/src/Footex/Dockerfile
          format: sarif
          output-file: hadolint-results.sarif
          no-fail: true

      - name: 📜 Display Hadolint Results
        run: |
          echo "🔍 Hadolint Linting Results:"
          echo "-----------------------------"
          cat hadolint-results.sarif || echo "⚠️ No results file found (check for errors above)."
          echo "-----------------------------"
      - name: 📤 Upload Hadolint Results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: hadolint-results.sarif

  infrastructure-scan:
    name: 🏗️ Infrastructure Security Scan
    runs-on: ubuntu-latest
    if: github.event.inputs.scan_type == 'full' || github.event.inputs.scan_type == ''

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔍 Run Checkov IaC Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: github_actions,dockerfile
          output_format: sarif
          output_file_path: checkov-results.sarif

      - name: 📤 Upload Checkov Results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: checkov-results.sarif

  security-summary:
    name: 📊 Security Summary
    runs-on: ubuntu-latest
    needs:
      [
        dependency-scan,
        code-analysis,
        secrets-scan,
        container-scan,
        infrastructure-scan,
      ]
    if: always()

    steps:
      - name: 📊 Generate Security Summary
        run: |
          # Map status strings to emojis
          get_status_emoji() {
            case "$1" in
              success) echo "✅ Passed" ;;
              failure) echo "❌ Failed" ;;
              skipped) echo "⏭️ Skipped" ;;
              cancelled) echo "🛑 Cancelled" ;;
              *) echo "❓ Unknown ($1)" ;;
            esac
          }

          DEP_STATUS=$(get_status_emoji "${{ needs.dependency-scan.result }}")
          CODE_STATUS=$(get_status_emoji "${{ needs.code-analysis.result }}")
          SECRETS_STATUS=$(get_status_emoji "${{ needs.secrets-scan.result }}")
          CONTAINER_STATUS=$(get_status_emoji "${{ needs.container-scan.result }}")
          INFRA_STATUS=$(get_status_emoji "${{ needs.infrastructure-scan.result }}")

          {
            echo "# 🔒 Security Scan Summary"
            echo ""
            echo "**Scan Date**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
            echo "**Repository**: [${{ github.repository }}](https://github.com/${{ github.repository }})"
            echo "**Commit**: [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})"
            echo "**Triggered by**: ${{ github.actor }}"
            echo ""
            echo "## 📋 Scan Results"
            echo ""
            echo "| Scan Type | Status | Notes |"
            echo "|-----------|--------|-------|"
            echo "| 📦 Dependency Scan | $DEP_STATUS | dotnet vulnerable package audit |"
            echo "| 🔍 Code Analysis | $CODE_STATUS | CodeQL (schedule/manual only) |"
            echo "| 🔐 Secrets Detection | $SECRETS_STATUS | GitLeaks scan |"
            echo "| 🐳 Container Scan | $CONTAINER_STATUS | Trivy & Hadolint analysis |"
            echo "| 🏗️ Infrastructure Scan | $INFRA_STATUS | Checkov IaC analysis |"
            echo ""
            echo "## 📦 Uploaded Artifacts & Reports"
            echo ""
            echo "You can download the generated scan artifacts at the bottom of the [Workflow Run Page](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}):"
            echo "- **[security-summary](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts)**: This summary report file."
            echo "- **[gitleaks-results.sarif](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts)**: GitLeaks secret scan results."
            echo ""
            echo "## 🔗 Security Dashboards"
            echo ""
            echo "- 🔍 **[Code Scanning Alerts](https://github.com/${{ github.repository }}/security/code-scanning)**: Detailed alerts from CodeQL, DevSkim, Trivy, Hadolint, and Checkov."
            echo "- 🔐 **[Secret Scanning Alerts](https://github.com/${{ github.repository }}/security/secret-scanning)**: Real-time leaked credential tracking from GitLeaks."
            echo "- 📦 **[Dependabot Alerts](https://github.com/${{ github.repository }}/security/dependabot)**: Automatic security updates and warnings for project dependencies."
            echo ""
            echo "## 💡 Recommendations"
            echo "- Review all security findings in the **Security** tab of the repository."
            echo "- Update vulnerable dependencies identified by the dependency scan."
            echo "- Fix code quality and security smells flagged by CodeQL/DevSkim."
            echo "- Ensure Dockerfiles are optimized based on Hadolint linting."
          } > security-summary.md

          # Write to workflow step summary so it appears on the run page
          cat security-summary.md >> $GITHUB_STEP_SUMMARY

      - name: 📤 Upload Security Summary
        uses: actions/upload-artifact@v4
        with:
          name: security-summary
          path: security-summary.md

      - name: 📧 Security Alert Notification
        if: needs.dependency-scan.result == 'failure' || needs.code-analysis.result == 'failure' || needs.secrets-scan.result == 'failure'
        run: |
          echo "🚨 SECURITY ALERT: One or more security scans failed!"
          echo "📋 Please review the security findings immediately."
          echo "🔗 Check the Security tab: https://github.com/${{ github.repository }}/security"

          # Add your alerting logic here:
          # - Send Slack alert to security team
          # - Create high-priority issue
          # - Email security team
          # - Update security dashboard
