name: 🔒 Security Monitoring

on:
  schedule:
    # Run daily security scans
    - cron: "0 2 * * *"
  push:
    branches: [main, develop]
    paths:
      - "**/packages.lock.json"
      - "**/package-lock.json"
      - "**/*.csproj"
      - "Dockerfile*"
  pull_request:
    branches: [main]
  workflow_dispatch: {}

env:
  DOTNET_VERSION: "9.0.x"

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  dependency-scan:
    name: 🔍 Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    if: github.event.inputs.scan_type == 'full' || github.event.inputs.scan_type == 'dependencies' || github.event.inputs.scan_type == ''

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔧 Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 📦 Restore Dependencies
        run: dotnet restore

      - name: 🔍 Run .NET Security Audit
        run: |
          echo "🔍 Running .NET security audit..."
          dotnet list package --vulnerable --include-transitive > vulnerability-report.txt 2>&1 || true

          if grep -q "no vulnerable packages" vulnerability-report.txt; then
            echo "✅ No vulnerable packages found"
          else
            echo "⚠️ Vulnerable packages detected:"
            cat vulnerability-report.txt
          fi

      - name: 🔍 OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "Footex"
          path: "."
          format: "ALL"
          args: >
            --enableRetired
            --enableExperimental
            --failOnCVSS 7
            --suppression suppression.xml

      - name: 📤 Upload Dependency Check Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: reports/

      - name: 📊 Publish Dependency Check Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: reports/dependency-check-report.sarif

  code-analysis:
    name: 🔍 Static Code Analysis
    runs-on: ubuntu-latest
    if: github.event.inputs.scan_type == 'full' || github.event.inputs.scan_type == 'code' || github.event.inputs.scan_type == ''

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔧 Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 🔍 Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
          queries: security-and-quality

      - name: 🏗️ Build for Analysis
        run: |
          dotnet restore
          dotnet build --configuration Release --no-restore

      - name: 🔍 Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:csharp"

      - name: 🔍 Run Security DevSkim
        uses: microsoft/DevSkim-Action@v1
        with:
          directory-to-scan: .

      - name: 📤 Upload DevSkim Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: devskim-results.sarif

  secrets-scan:
    name: 🔐 Secrets Detection
    runs-on: ubuntu-latest
    if: github.event.inputs.scan_type == 'full' || github.event.inputs.scan_type == 'code' || github.event.inputs.scan_type == ''

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --debug --only-verified

      - name: 🔍 Run GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.CR_PAT }}

  container-scan:
    name: 🐳 Container Security Scan
    runs-on: ubuntu-latest
    if: github.event.inputs.scan_type == 'full' || github.event.inputs.scan_type == 'containers' || github.event.inputs.scan_type == ''

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🏗️ Build Docker Image
        run: |
          docker build -t footex-security-scan:latest -f Footex/Dockerfile .

      - name: 🔍 Run Trivy Container Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "footex-security-scan:latest"
          format: "sarif"
          output: "trivy-results.sarif"

      - name: 📤 Upload Trivy Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

      - name: 🔍 Run Hadolint Dockerfile Linting
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Footex/Dockerfile
          format: sarif
          output-file: hadolint-results.sarif
          no-fail: true

      - name: 📜 Display Hadolint Results
        run: |
          echo "🔍 Hadolint Linting Results:"
          echo "-----------------------------"
          cat hadolint-results.sarif || echo "⚠️ No results file found (check for errors above)."
          echo "-----------------------------"
      - name: 📤 Upload Hadolint Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: hadolint-results.sarif

  infrastructure-scan:
    name: 🏗️ Infrastructure Security Scan
    runs-on: ubuntu-latest
    if: github.event.inputs.scan_type == 'full' || github.event.inputs.scan_type == ''

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔍 Run Checkov IaC Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: github_actions,dockerfile
          output_format: sarif
          output_file_path: checkov-results.sarif

      - name: 📤 Upload Checkov Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-results.sarif
          
      # checkov:skip=CKV_GHA_2:This script is a linter and does not execute untrusted input from file names.
      - name: 🔍 Analyze GitHub Actions Security
        run: |
          #!/bin/bash
          echo "🔍 Analyzing GitHub Actions workflows for common security concerns..."

          # Find all YAML workflow files
          find .github/workflows -name "*.yml" -o -name "*.yaml" | while read -r file; do
            echo "--- Checking: $file ---"

            # Check for 'pull_request_target' usage
            if grep -q "pull_request_target" "$file"; then
              echo "  ⚠️ Warning: 'pull_request_target' found. Review this workflow for potential privilege escalation vulnerabilities."
              echo "     Recommendation: Ensure no untrusted code runs on 'pull_request_target' or restrict permissions."
            fi

            # Check for checkout with untrusted ref (e.g., using head.sha in a checkout action)
            # This is a common pattern when 'pull_request_target' is used and can be dangerous.
            if grep -q "uses: actions/checkout@.*with:.*ref:.*\${{ github.event.pull_request.head.sha }}" "$file"; then
              echo "  ⚠️ Warning: Found 'checkout' action using 'github.event.pull_request.head.sha'."
              echo "     Recommendation: Avoid checking out untrusted PR head SHAs when 'pull_request_target' is used, as it can expose secrets."
            fi

            # Check for direct evaluation of untrusted event data in run commands
            # This is a simplified check and might have false positives/negatives.
            # A more robust check might involve parsing the YAML and looking for specific contexts.
            if grep -q "run:.*\${{ github.event.pull_request.body }}" "$file" || \
               grep -q "run:.*\${{ github.event.issue.body }}" "$file" || \
               grep -q "run:.*\${{ github.event.comment.body }}" "$file"; then
              echo "  ⚠️ Warning: Potential for script injection from untrusted event data (e.g., PR body, issue body, comment body)."
              echo "     Recommendation: Sanitize or strictly validate any user-supplied input before using it directly in 'run' commands."
            fi
          done

          echo "✅ Workflow analysis complete."

  security-summary:
    name: 📊 Security Summary
    runs-on: ubuntu-latest
    needs:
      [
        dependency-scan,
        code-analysis,
        secrets-scan,
        container-scan,
        infrastructure-scan,
      ]
    if: always()

    steps:
      - name: 📊 Generate Security Summary
        run: |
          echo "# 🔒 Security Scan Summary" > security-summary.md
          echo "" >> security-summary.md
          echo "**Scan Date**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> security-summary.md
          echo "**Repository**: ${{ github.repository }}" >> security-summary.md
          echo "**Commit**: ${{ github.sha }}" >> security-summary.md
          echo "**Triggered by**: ${{ github.actor }}" >> security-summary.md
          echo "" >> security-summary.md

          echo "## 📋 Scan Results" >> security-summary.md
          echo "" >> security-summary.md
          echo "| Scan Type | Status | Notes |" >> security-summary.md
          echo "|-----------|--------|-------|" >> security-summary.md
          echo "| Dependency Scan | ${{ needs.dependency-scan.result }} | NuGet packages & OWASP check |" >> security-summary.md
          echo "| Code Analysis | ${{ needs.code-analysis.result }} | CodeQL & DevSkim analysis |" >> security-summary.md
          echo "| Secrets Detection | ${{ needs.secrets-scan.result }} | TruffleHog & GitLeaks scan |" >> security-summary.md
          echo "| Container Scan | ${{ needs.container-scan.result }} | Trivy & Hadolint analysis |" >> security-summary.md
          echo "| Infrastructure Scan | ${{ needs.infrastructure-scan.result }} | Checkov IaC analysis |" >> security-summary.md
          echo "" >> security-summary.md

          echo "## 🔗 Recommendations" >> security-summary.md
          echo "" >> security-summary.md
          echo "- Review all security findings in the Security tab" >> security-summary.md
          echo "- Update vulnerable dependencies identified" >> security-summary.md
          echo "- Address any code quality issues found" >> security-summary.md
          echo "- Ensure container images are rebuilt with latest base images" >> security-summary.md

          cat security-summary.md

      - name: 📤 Upload Security Summary
        uses: actions/upload-artifact@v4
        with:
          name: security-summary
          path: security-summary.md

      - name: 📧 Security Alert Notification
        if: needs.dependency-scan.result == 'failure' || needs.code-analysis.result == 'failure' || needs.secrets-scan.result == 'failure'
        run: |
          echo "🚨 SECURITY ALERT: One or more security scans failed!"
          echo "📋 Please review the security findings immediately."
          echo "🔗 Check the Security tab: https://github.com/${{ github.repository }}/security"

          # Add your alerting logic here:
          # - Send Slack alert to security team
          # - Create high-priority issue
          # - Email security team
          # - Update security dashboard

