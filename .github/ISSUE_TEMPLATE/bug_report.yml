name: 🐛 Bug Report
description: Report a bug to help us improve Footex
title: "[BUG] "
labels: ["bug", "needs-triage"]
projects: ["Footex"]

body:
  - type: markdown
    attributes:
      value: |
        ## 🐛 Bug Report
        Thank you for taking the time to report a bug! Please fill out the following information to help us reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: 📋 Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 🔄 Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: ✅ Expected Behavior
      description: A clear and concise description of what you expected to happen.
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: ❌ Actual Behavior
      description: A clear and concise description of what actually happened.
      placeholder: What actually happened?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: 📸 Screenshots/Logs
      description: If applicable, add screenshots or error logs to help explain your problem.
      placeholder: Paste screenshots or logs here...

  - type: dropdown
    id: severity
    attributes:
      label: 🚨 Severity
      description: How severe is this bug?
      options:
        - Critical (System unusable)
        - High (Major feature broken)
        - Medium (Minor feature affected)
        - Low (Cosmetic issue)
      default: 2
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: 🎯 Component
      description: Which component is affected?
      options:
        - API/Backend
        - Frontend/UI
        - Database
        - Authentication
        - File Upload
        - Performance
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: 📱 Version
      description: What version of Footex are you using?
      placeholder: v1.0.0

  - type: textarea
    id: environment
    attributes:
      label: 🖥️ Environment
      description: Describe your environment
      placeholder: |
        - OS: [e.g., Windows 11, macOS 12.0, Ubuntu 20.04]
        - Browser: [e.g., Chrome 98, Firefox 97, Safari 15]
        - .NET Version: [e.g., .NET 6.0]
        - Database: [e.g., PostgreSQL 14.0]

  - type: textarea
    id: additional
    attributes:
      label: 📝 Additional Context
      description: Add any other context about the problem here.

  - type: checkboxes
    id: terms
    attributes:
      label: ✅ Confirmation
      description: Please confirm the following
      options:
        - label: I have searched existing issues to avoid duplicates
          required: true
        - label: I have provided all necessary information
          required: true
        - label: This is not a question but a bug report
          required: true
