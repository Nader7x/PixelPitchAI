version: "3.8"

services:
  # 1. PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: footex-postgres
    environment:
      POSTGRES_DB: Footex_Api
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: footex_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - footex-monorepo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d Footex_Api"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # 2. Redis Cache
  redis:
    image: redis:7-alpine
    container_name: footex-redis
    command: redis-server --appendonly yes --requirepass footex_redis_password
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - footex-monorepo-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # 3. RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: footex-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: footex
      RABBITMQ_DEFAULT_PASS: footex_password
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - footex-monorepo-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # 4. Footex .NET 10 API Application
  footex-api:
    build:
      context: ./backend
      dockerfile: src/Footex/Dockerfile
      args:
        BUILD_CONFIGURATION: Release
    container_name: footex-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=postgres;Port=5432;Database=Footex_Api;User Id=postgres;Password=footex_password;Include Error Detail=true;
      - ConnectionStrings__RemoteRedisConnection=redis:6379
      - RabbitMQ__HostName=rabbitmq
      - RabbitMQ__UserName=footex
      - RabbitMQ__Password=footex_password
      - RabbitMQ__VirtualHost=/
      - RabbitMQ__Port=5672
      - RabbitMQ__QueueName=match_events_queue
      - RedisCache__LocalConnectionString=redis:6379
      - RedisCache__InstanceName=Footex_Prod_
      - RedisCache__DefaultExpirationMinutes=10
      - JWT__Secret=${JWT_SECRET:-your-production-super-secret-key-32-chars-long}
      - JWT__ValidIssuer=https://${DOMAIN:-localhost}
      - JWT__ValidAudience=https://${DOMAIN:-localhost}
      - JWT__ExpiryInMinutes=60
      - AdminUser__Email=admin@footex.com
      - AdminUser__Password=${ADMIN_PASSWORD:-AdminPassword123!}
      - SIMULATION_API_KEY=football_simulation_production_key
      - SIMULATION_SERVICE_URL=http://simulation-engine:8000
      - SmtpSettings__Host=${SMTP_HOST:-smtp.gmail.com}
      - SmtpSettings__Port=${SMTP_PORT:-587}
      - SmtpSettings__UserName=${SMTP_USERNAME:-}
      - SmtpSettings__Password=${SMTP_PASSWORD:-}
      - SmtpSettings__FromEmail=${SMTP_FROM_EMAIL:-no-reply@footex.com}
      - SmtpSettings__EnableSSL=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - footex-monorepo-network
    volumes:
      - ./backend/src/Footex/Logs:/app/Logs
      - api_temp:/app/temp
    restart: unless-stopped

  # 5. Python AI / Match Simulation API
  simulation-engine:
    build:
      context: ./simulation-engine
      dockerfile: Dockerfile
    container_name: football-match-api
    environment:
      - MODEL_PATH=/app/gpt2-football-finetuned
      - XGB_MODEL_PATH=/app/tuned_xgboost_model.json
      - SECRET_KEY=${SECRET_KEY:-your-super-secret-key-change-in-production}
      - API_KEY=football_simulation_production_key
      - HEADERLINES_DIR=/app/HeaderLines
      - INPUTTOKENS_DIR=/app/InputTokens
      - SIMMATCHES_DIR=/app/SimulatedMatches
      - STATUS_DIR=/app/SimulationStatus
    volumes:
      - ./simulation-engine/HeaderLines:/app/HeaderLines
      - ./simulation-engine/InputTokens:/app/InputTokens
      - ./simulation-engine/SimulatedMatches:/app/SimulatedMatches
      - ./simulation-engine/SimulationStatus:/app/SimulationStatus
      - ./simulation-engine/football_api.log:/app/football_api.log
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - footex-monorepo-network

  # 6. Next.js Frontend Production Server
  football-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
    container_name: football-simulation
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://${DOMAIN:-localhost}/api
      - NEXT_PUBLIC_SIGNALR_URL=https://${DOMAIN:-localhost}/api/hubs
    networks:
      - footex-monorepo-network
    restart: unless-stopped

  # 7. Caddy Global Reverse Proxy
  caddy:
    image: caddy:2.7-alpine
    container_name: footex-caddy
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - footex-api
      - simulation-engine
      - football-frontend
    networks:
      - footex-monorepo-network
    restart: unless-stopped

networks:
  footex-monorepo-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
  api_temp:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
